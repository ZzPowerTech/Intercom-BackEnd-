services:
  api:
    build: .
    container_name: api-intercom
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-llwk20051}
      DB_NAME: ${DB_NAME:-intercom}
      JWT_SECRET: ${JWT_SECRET:-fag-intercom-secret-key}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-admin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-admin12345}
      MINIO_BUCKET: ${MINIO_BUCKET:-intercom}
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: minio-local
    ports:
      - "9000:9000" # API S3
      - "9002:9001" # Console Web
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-admin12345}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  postgres:
    image: postgres:16
    container_name: postgres-local
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-llwk20051}
      POSTGRES_DB: ${DB_NAME:-intercom}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-intercom}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  minio-data:
  postgres-data:
